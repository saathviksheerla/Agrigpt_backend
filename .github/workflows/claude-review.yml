name: Claude PR Review & Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Claude PR Review
        uses: anthropic/claude-code-action@beta
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            You are reviewing a pull request for the AgriGPT FastAPI backend agent.

            Project context:
            - FastAPI app (`app.py`) serving a LangGraph-powered agricultural chatbot
            - Connects to multiple MCP servers (Alumnx, Vignan) for tool discovery
            - Uses Google Gemini as the LLM via LangChain
            - Stores chat history in MongoDB
            - Deployed to EC2 via SSH (deploy.yml)

            Review the changed files with these priorities:

            1. SECURITY: API keys exposed, injection vulnerabilities, unvalidated inputs at boundaries
            2. CORRECTNESS: Logic errors, incorrect async/sync usage, MongoDB query safety
            3. RELIABILITY: Error handling, MCP client failure scenarios, global state (global_tool_results) thread safety
            4. FASTAPI PATTERNS: Proper use of response models, background tasks, status codes
            5. LANGGRAPH/LANGCHAIN: Correct graph flow, tool binding, message handling

            Respond with:
            - A summary of what the PR does
            - A bulleted list of issues found (label each: CRITICAL / WARNING / SUGGESTION)
            - A clear VERDICT at the end: "APPROVED ✅", "APPROVED WITH SUGGESTIONS ✅", or "CHANGES REQUESTED ❌"

            If CRITICAL issues exist → request changes.
            If only WARNINGs or SUGGESTIONs → approve with suggestions.
            If clean → approve.

  auto-merge:
    name: Auto-Merge After Approval
    runs-on: ubuntu-latest
    needs: review
    if: |
      github.event_name == 'pull_request' &&
      (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'master')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable Auto-Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto \
            --subject "$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json title -q .title)" || \
          echo "Auto-merge could not be enabled (branch protection may need to be configured). Skipping."
